nameOverride: ""
fullnameOverride: ""

image:
  repository: redmine
  tag: 6.1.3-trixie
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1

deploymentStrategy:
  type: Recreate

migrations:
  # startup: the official entrypoint runs migrations before Puma starts.
  # job: a Helm hook Job runs migrations and the Deployment skips them.
  # disabled: the Deployment skips all automatic migrations.
  mode: startup
  plugins: false
  job:
    backoffLimit: 1
    activeDeadlineSeconds: 1800
    ttlSecondsAfterFinished: 86400
    annotations: {}

database:
  # Supported values: sqlite, postgresql, mysql, sqlserver.
  type: sqlite
  host: ""
  port: ""
  name: redmine
  username: redmine
  encoding: utf8
  existingSecret: redmine-runtime
  passwordKey: database-password
  wait:
    enabled: true
    timeoutSeconds: 300

secretKeyBase:
  # Leave empty to create and preserve a release-managed Secret.
  existingSecret: ""
  key: secret-key-base
  annotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 999
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsGroup: 999
  runAsNonRoot: true
  runAsUser: 999

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: redmine.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

gatewayAPI:
  httpRoute:
    enabled: false
    annotations: {}
    labels: {}
    parentRefs:
      - name: gateway
        namespace: gateway-system
        sectionName: https
    hostnames:
      - redmine.example.com
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        filters: []
        timeouts: {}

probes:
  startup:
    enabled: true
    path: /
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
    successThreshold: 1
  readiness:
    enabled: true
    path: /
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1
  liveness:
    enabled: true
    path: /
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

# The defaults create a minimal persistent SQLite installation. Use
# existingClaim to attach migrated Docker volumes.
persistence:
  files:
    enabled: true
    create: true
    retain: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}
    mounts:
      - mountPath: /usr/src/redmine/files
        readOnly: false
  sqlite:
    enabled: true
    create: true
    retain: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}
    mounts:
      - mountPath: /usr/src/redmine/sqlite
        readOnly: false
  config:
    enabled: false
    create: false
    retain: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}
    mounts:
      - mountPath: /usr/src/redmine/config/configuration.yml
        subPath: configuration.yml
        readOnly: true
  plugins:
    # Enable only after every plugin is checked against Redmine 6.1/Rails 7.2.
    enabled: false
    create: false
    retain: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    storageClass: ""
    annotations: {}
    mounts:
      - mountPath: /usr/src/redmine/plugins
        readOnly: false
  public:
    # Mount custom themes or assets by subPath, never the complete public tree.
    enabled: false
    create: false
    retain: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}
    mounts:
      - mountPath: /usr/src/redmine/public/themes/techpipe
        subPath: themes/techpipe
        readOnly: true

volumePermissions:
  enabled: false
  persistenceNames:
    - files
    - sqlite
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

networkPolicy:
  enabled: false
  ingress: []
  egress: []

mailReceiver:
  enabled: false
  schedule: "*/5 * * * *"
  suspend: true
  protocol: IMAP
  host: ""
  port: 993
  ssl: "1"
  starttls: ""
  folder: INBOX
  moveOnSuccess: ""
  moveOnFailure: ""
  deleteUnprocessed: ""
  existingSecret: redmine-mail-receiver
  usernameKey: username
  passwordKey: password
  options: {}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  backoffLimit: 1
  activeDeadlineSeconds: 600
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity

# Simple environment variables merged with the chart defaults.
env:
  TMPDIR: /var/tmp/redmine
  RAILS_ENV: production

# Writable temporary storage shared by all chart-managed Redmine containers.
tmpDir:
  enabled: true
  mountPath: /var/tmp/redmine
  emptyDir: {}

# Full Kubernetes EnvVar, EnvFromSource, Volume, and VolumeMount entries.
extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []
extraInitContainers: []
sidecars: []

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

tests:
  enabled: true
