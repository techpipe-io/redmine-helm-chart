{{- if .Values.mailReceiver.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "redmine.fullname" . }}-mail-receiver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redmine.labels" . | nindent 4 }}
    app.kubernetes.io/component: mail-receiver
spec:
  schedule: {{ .Values.mailReceiver.schedule | quote }}
  suspend: {{ .Values.mailReceiver.suspend }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.mailReceiver.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.mailReceiver.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.mailReceiver.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.mailReceiver.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "redmine.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: mail-receiver
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "redmine.serviceAccountName" . }}
          automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- with .Values.image.pullSecrets }}
          imagePullSecrets:
            {{- range . }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
          containers:
            - name: mail-receiver
              image: {{ include "redmine.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - bundle
              args:
                - exec
                - rake
                - {{ if eq .Values.mailReceiver.protocol "POP3" }}redmine:email:receive_pop3{{ else }}redmine:email:receive_imap{{ end }}
              env:
                {{- include "redmine.commonEnv" . | nindent 16 }}
                - name: REDMINE_NO_DB_MIGRATE
                  value: "1"
                - name: RAILS_ENV
                  value: production
                - name: host
                  value: {{ .Values.mailReceiver.host | quote }}
                - name: port
                  value: {{ .Values.mailReceiver.port | quote }}
                - name: username
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.mailReceiver.existingSecret }}
                      key: {{ .Values.mailReceiver.usernameKey }}
                - name: password
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.mailReceiver.existingSecret }}
                      key: {{ .Values.mailReceiver.passwordKey }}
                - name: ssl
                  value: {{ .Values.mailReceiver.ssl | quote }}
                - name: starttls
                  value: {{ .Values.mailReceiver.starttls | quote }}
                {{- if eq .Values.mailReceiver.protocol "IMAP" }}
                - name: folder
                  value: {{ .Values.mailReceiver.folder | quote }}
                - name: move_on_success
                  value: {{ .Values.mailReceiver.moveOnSuccess | quote }}
                - name: move_on_failure
                  value: {{ .Values.mailReceiver.moveOnFailure | quote }}
                {{- else }}
                - name: delete_unprocessed
                  value: {{ .Values.mailReceiver.deleteUnprocessed | quote }}
                {{- end }}
                {{- range $name, $value := .Values.mailReceiver.options }}
                - name: {{ $name }}
                  value: {{ $value | quote }}
                {{- end }}
              {{- with .Values.extraEnvFrom }}
              envFrom:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.mailReceiver.resources | nindent 16 }}
              {{- with (include "redmine.volumeMounts" .) }}
              volumeMounts:
                {{- . | nindent 16 }}
              {{- end }}
          {{- with (include "redmine.volumes" .) }}
          volumes:
            {{- . | nindent 12 }}
          {{- end }}
{{- end }}
