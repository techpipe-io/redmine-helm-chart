{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "redmine.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redmine.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: curl
      image: curlimages/curl:8.16.0
      imagePullPolicy: IfNotPresent
      command:
        - curl
      args:
        - --fail
        - --silent
        - --show-error
        - --max-time
        - "10"
        - http://{{ include "redmine.fullname" . }}:{{ .Values.service.port }}/
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
{{- end }}
