{{- $configPersistence := index .Values.persistence "config" -}}
{{- $prepareConfigurationFile := and $configPersistence $configPersistence.enabled $configPersistence.prepareConfigurationFile -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redmine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redmine.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.deploymentStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "redmine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/runtime-settings: {{ dict "database" .Values.database "migrations" .Values.migrations "secretKeyBase" .Values.secretKeyBase | toJson | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "redmine.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "redmine.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if or (and (ne .Values.database.type "sqlite") .Values.database.wait.enabled) .Values.volumePermissions.enabled $prepareConfigurationFile .Values.extraInitContainers }}
      initContainers:
        {{- if and (ne .Values.database.type "sqlite") .Values.database.wait.enabled }}
        - name: wait-for-database
          image: {{ include "redmine.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bash
            - -ec
          args:
            - |
              deadline=$((SECONDS + {{ .Values.database.wait.timeoutSeconds }}))
              until (echo > "/dev/tcp/${DB_HOST}/${DB_PORT}") >/dev/null 2>&1; do
                if (( SECONDS >= deadline )); then
                  echo "Database wait timed out" >&2
                  exit 1
                fi
                sleep 2
              done
          env:
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ include "redmine.databasePort" . | quote }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        {{- end }}
        {{- if .Values.volumePermissions.enabled }}
        - name: volume-permissions
          image: {{ include "redmine.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bash
            - -ec
          args:
            - |
              for path in{{- range .Values.volumePermissions.persistenceNames }} /mnt/{{ . }}{{- end }}; do
                [ -d "$path" ] || continue
                find "$path" -mindepth 1 -maxdepth 1 ! -name lost+found ! -name .snapshot -exec chown -R 999:999 '{}' +
                chown 999:999 "$path"
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
          resources:
            {{- toYaml .Values.volumePermissions.resources | nindent 12 }}
          volumeMounts:
            {{- range $name := .Values.volumePermissions.persistenceNames }}
            {{- $config := index $.Values.persistence $name }}
            - name: {{ include "redmine.persistenceVolumeName" $name }}
              mountPath: /mnt/{{ $name }}
            {{- end }}
        {{- end }}
        {{- if $prepareConfigurationFile }}
        {{- include "redmine.prepareConfigurationContainer" . | nindent 8 }}
        {{- end }}
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: redmine
          image: {{ include "redmine.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if .Values.diagnosticMode.enabled }}
          command:
            {{- toYaml .Values.diagnosticMode.command | nindent 12 }}
          args:
            {{- toYaml .Values.diagnosticMode.args | nindent 12 }}
          {{- end }}
          env:
            {{- include "redmine.commonEnv" . | nindent 12 }}
            {{- if ne .Values.migrations.mode "startup" }}
            - name: REDMINE_NO_DB_MIGRATE
              value: "1"
            {{- end }}
            {{- if and (eq .Values.migrations.mode "startup") .Values.migrations.plugins }}
            - name: REDMINE_PLUGINS_MIGRATE
              value: "1"
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if not .Values.diagnosticMode.enabled }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            successThreshold: {{ .Values.probes.startup.successThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with (include "redmine.volumeMounts" .) }}
          volumeMounts:
            {{- . | nindent 12 }}
          {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with (include "redmine.volumes" .) }}
      volumes:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
